<html>
  <head>
    <!-- various document-wide declarations -->
    <title>navigateur</title>
    <link rel="stylesheet" href="navigateur.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600" rel="stylesheet">

  </head>
  <body>
    <!-- Remarque ici c'est pour l'home, il faut changer par page quelle classe est active dans : <a class="tab-link is-active"-->
     <nav class="tab-nav">
        <a class="tab-link is-active" href="/home" data-target="home">
            <span class="tab-icon">
                <img viewBox="0 0 40 40" height="100px" width="100px" src="/navigateur/home.svg"> </img>
            </span>
            <span class="text">Accueil</span>
        </a>
        <a class="tab-link" href="/map" data-target="map">
            <span class="tab-icon">
                <img height="100px" width="100px" src="/navigateur/map.svg">
        
            </span>
            <span class="text">Plan</span>
        </a>
        <a class="tab-link" href="/gallery" data-target="gallery">
            <span class="tab-icon">
                <img  height="100px" width="100px" src="/navigateur/gallery.svg"> </img>
            </span>
            <span class="text">Salle</span>
        </a>
        <a class="tab-link" href="/QrCode" data-target="QrCode">
            <span class="tab-icon">
                <img  height="100px" width="100px" src="/navigateur/qr-code.svg"> </img>
            </span>
            <span class="text">Qr Code</span>
        </a>
        <a class="tab-link" href="/Info" data-target="Info">
            <span class="tab-icon">
                <img  height="100px" width="100px" src="/navigateur/information.svg"> </img>
            </span>
            <span class="text">Infos</span>
        </a>

</html>
