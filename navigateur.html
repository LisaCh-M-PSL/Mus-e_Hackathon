<html>
  <head>
    <!-- various document-wide declarations -->
    <title>navigateur</title>
    <link rel="stylesheet" href="navigateur.css">
  </head>
  <body>
    <!-- Remarque ici c'est pour l'accueil, il faut changer par page quelle classe est active dans : <a class="tab-link is-active"-->
    <nav class="tab-nav">
        <a class="tab-link is-active" href="/home" data-target="home">
            <span class="tab-icon">
                <img viewBox="0 0 40 40" height="100px" width="100px" src="home.svg"> </img>
            </span>
            <span>Accueil</span>
        </a>
        <a class="tab-link" href="/map" data-target="map">
            <span class="tab-icon">
                <img height="100px" width="100px" src="map.svg">
        
            </span>
            <span>Plan</span>
        </a>
        <a class="tab-link" href="/gallery" data-target="gallery">
            <span class="tab-icon">
                <img  height="100px" width="100px" src="gallery.svg"> </img>
            </span>
            <span>Salle</span>
        </a>
        <a class="tab-link" href="/QrCode" data-target="QrCode">
            <span class="tab-icon">
                <img  height="100px" width="100px" src="qr-code.svg"> </img>
            </span>
            <span>Qr Code</span>
        </a>
        <a class="tab-link" href="/Info" data-target="Info">
            <span class="tab-icon">
                <img  height="100px" width="100px" src="information.svg"> </img>
            </span>
            <span>Infos</span>
        </a>
    </nav>
  </body>
</html>
